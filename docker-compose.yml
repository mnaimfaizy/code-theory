services:
  postgres:
    image: postgres:17-alpine
    container_name: code-theory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: code_theory
      POSTGRES_USER: code_theory
      POSTGRES_PASSWORD: code_theory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U code_theory -d code_theory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: code-theory-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codetheory.dev
      PGADMIN_DEFAULT_PASSWORD: code_theory_admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: