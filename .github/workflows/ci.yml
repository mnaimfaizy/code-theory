name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NEXT_TELEMETRY_DISABLED: "1"
    AUTH_SECRET: ci-build-placeholder-secret
    AUTH_URL: https://example.invalid
    DATABASE_URL: file:./data/code-theory.db
    LLM_BASE_URL: http://127.0.0.1:11434/v1
    LLM_MODEL: disabled-in-ci
    LLM_API_KEY: disabled-in-ci

jobs:
    prepare:
        name: Prepare Dependencies
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Restore dependency cache
              id: dependency-cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      ~/.npm
                  key: ${{ runner.os }}-node20-deps-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node20-deps-

            - name: Install dependencies
              run: npm ci

            - name: Save dependency cache
              if: steps.dependency-cache.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: |
                      node_modules
                      ~/.npm
                  key: ${{ runner.os }}-node20-deps-${{ hashFiles('package-lock.json') }}

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: prepare
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Restore dependency cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      ~/.npm
                  key: ${{ runner.os }}-node20-deps-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node20-deps-

            - name: Verify cached dependencies
              shell: bash
              run: |
                  if [ ! -d node_modules ]; then
                    echo "node_modules was not restored from cache." >&2
                    exit 1
                  fi

            - name: Run lint
              run: npm run lint

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: prepare
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Restore dependency cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      ~/.npm
                  key: ${{ runner.os }}-node20-deps-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node20-deps-

            - name: Verify cached dependencies
              shell: bash
              run: |
                  if [ ! -d node_modules ]; then
                    echo "node_modules was not restored from cache." >&2
                    exit 1
                  fi

            - name: Detect test script
              id: detect-test
              shell: bash
              run: |
                  if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.test ? 0 : 1)"; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Run tests
              if: steps.detect-test.outputs.exists == 'true'
              run: npm test

            - name: Skip tests
              if: steps.detect-test.outputs.exists != 'true'
              run: echo "No test script is defined in package.json, so CI skips automated tests for now."

    build:
        name: Build
        runs-on: ubuntu-latest
        needs:
            - prepare
            - lint
            - test
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Restore dependency cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      ~/.npm
                  key: ${{ runner.os }}-node20-deps-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node20-deps-

            - name: Verify cached dependencies
              shell: bash
              run: |
                  if [ ! -d node_modules ]; then
                    echo "node_modules was not restored from cache." >&2
                    exit 1
                  fi

            - name: Restore Next.js build cache
              id: next-cache
              uses: actions/cache/restore@v4
              with:
                  path: .next/cache
                  key: ${{ runner.os }}-node20-next-cache-${{ hashFiles('package-lock.json', 'package.json', 'next.config.ts', 'tsconfig.json', 'src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
                  restore-keys: |
                      ${{ runner.os }}-node20-next-cache-${{ hashFiles('package-lock.json') }}-
                      ${{ runner.os }}-node20-next-cache-

            - name: Run build
              run: npm run build

            - name: Save Next.js build cache
              if: steps.next-cache.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: .next/cache
                  key: ${{ runner.os }}-node20-next-cache-${{ hashFiles('package-lock.json', 'package.json', 'next.config.ts', 'tsconfig.json', 'src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
