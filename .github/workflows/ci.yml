name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  AUTH_SECRET: ci-build-placeholder-secret
  AUTH_URL: https://example.invalid
  DATABASE_URL: file:./data/code-theory.db
  LLM_BASE_URL: http://127.0.0.1:11434/v1
  LLM_MODEL: disabled-in-ci
  LLM_API_KEY: disabled-in-ci

jobs:
  authoritative-lockfile-policy:
    name: Authoritative Lockfile Policy
    runs-on: ubuntu-latest

    steps:
      - name: Skip outside pull requests
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "Lockfile policy runs only for pull_request events." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Block Yarn and pnpm lockfiles in pull requests
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed_files="$(git diff --name-only --diff-filter=ACMRT "${BASE_SHA}" "${HEAD_SHA}")"

          echo "Changed files in PR:" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$changed_files" ]; then
            printf '%s\n' "$changed_files" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "(none)" >> "$GITHUB_STEP_SUMMARY"
          fi

          disallowed_lockfiles="$(printf '%s\n' "$changed_files" | grep -E '(^|/)(yarn\.lock|pnpm-lock\.yaml)$' || true)"

          if [ -n "$disallowed_lockfiles" ]; then
            echo "::error title=Disallowed lockfile detected::This repository accepts only package-lock.json in pull requests. Remove yarn.lock and pnpm-lock.yaml changes from the PR."
            {
              echo
              echo "Disallowed lockfile changes:" 
              printf '%s\n' "$disallowed_lockfiles"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo >> "$GITHUB_STEP_SUMMARY"
          echo "No Yarn or pnpm lockfiles were introduced or modified in this pull request." >> "$GITHUB_STEP_SUMMARY"

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check dependency review API availability
        id: dependency-review-availability
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          response_file="$(mktemp)"
          status_code="$(curl --silent --output "$response_file" --write-out '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}")"

          if [ "$status_code" = "200" ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status_code" = "403" ] || [ "$status_code" = "404" ]; then
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "status_code=$status_code" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat "$response_file"
          echo "Unexpected dependency review API response: $status_code" >&2
          exit 1

      - name: Checkout repository
        if: steps.dependency-review-availability.outputs.supported == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Review dependency changes
        if: steps.dependency-review-availability.outputs.supported == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          fail-on-scopes: development, runtime, unknown

      - name: Explain skipped dependency review
        if: steps.dependency-review-availability.outputs.supported != 'true'
        shell: bash
        env:
          STATUS_CODE: ${{ steps.dependency-review-availability.outputs.status_code }}
        run: |
          echo "::warning title=Dependency review skipped::GitHub dependency review is unavailable for this repository. Enable Dependency graph in repository settings to re-enable this check."
          {
            echo "## Dependency review skipped"
            echo
            echo "GitHub's dependency review API returned HTTP ${STATUS_CODE:-unknown} for this repository."
            echo
            echo "Enable Dependency graph in repository settings to re-enable actions/dependency-review-action."
          } >> "$GITHUB_STEP_SUMMARY"

  secure-install-review:
    name: Secure Install Review
    runs-on: ubuntu-latest
    needs: authoritative-lockfile-policy

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependency metadata without scripts
        run: npm ci --ignore-scripts

      - name: Verify frozen lockfile
        run: git diff --exit-code -- package-lock.json

      - name: Run npm audit
        run: npm audit --audit-level=high

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: secure-install-review

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frozen lockfile
        run: git diff --exit-code -- package-lock.json

      - name: Run lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: secure-install-review

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frozen lockfile
        run: git diff --exit-code -- package-lock.json

      - name: Detect test script
        id: detect-test
        shell: bash
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.test ? 0 : 1)"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.detect-test.outputs.exists == 'true'
        run: npm test

      - name: Skip tests
        if: steps.detect-test.outputs.exists != 'true'
        run: echo "No test script is defined in package.json, so CI skips automated tests for now."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - authoritative-lockfile-policy
      - secure-install-review
      - lint
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .next/cache
          key: ${{ runner.os }}-node20-next-cache-${{ hashFiles('package-lock.json', 'package.json', 'next.config.ts', 'tsconfig.json', 'src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-node20-next-cache-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-node20-next-cache-

      - name: Install dependencies
        run: npm ci

      - name: Verify frozen lockfile
        run: git diff --exit-code -- package-lock.json

      - name: Run build
        run: npm run build
