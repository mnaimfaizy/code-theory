name: Deploy To cPanel

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            dry_run:
                description: Only calculate FTP changes without uploading them
                required: false
                type: boolean
                default: false

concurrency:
    group: cpanel-deploy
    cancel-in-progress: true

permissions:
    contents: read

env:
    NEXT_TELEMETRY_DISABLED: "1"
    AUTH_SECRET: ci-build-placeholder-secret
    AUTH_URL: https://example.invalid
    # Build-time placeholder only. Configure the real PostgreSQL DATABASE_URL in cPanel.
    DATABASE_URL: file:./data/code-theory.db
    LLM_BASE_URL: http://127.0.0.1:11434/v1
    LLM_MODEL: disabled-in-ci
    LLM_API_KEY: disabled-in-ci

jobs:
    build:
        name: Lint And Build Bundle
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Setup Node.js 20
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: "20"
                  cache: npm

            - name: Restore Next.js build cache
              uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
              with:
                  path: .next/cache
                  key: ${{ runner.os }}-node20-cpanel-next-cache-${{ hashFiles('package-lock.json', 'package.json', 'next.config.ts', 'tsconfig.json', 'src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
                  restore-keys: |
                      ${{ runner.os }}-node20-cpanel-next-cache-${{ hashFiles('package-lock.json') }}-
                      ${{ runner.os }}-node20-cpanel-next-cache-

            - name: Install dependencies
              run: npm ci

            - name: Verify frozen lockfile
              run: git diff --exit-code -- package-lock.json

            - name: Lint
              run: npm run lint

            - name: Build cPanel bundle
              run: npm run build:cpanel

            - name: Upload deploy bundle artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: cpanel-ftp-bundle
                  path: ./.deploy/cpanel/
                  include-hidden-files: true
                  if-no-files-found: error
                  retention-days: 7

    deploy:
        name: Deploy To cPanel
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download deploy bundle artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: cpanel-ftp-bundle
                  path: ./.deploy/cpanel/

            - name: Sync bundle to cPanel over FTP
              uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a # v4.3.6
              with:
                  server: ${{ secrets.CPANEL_FTP_SERVER }}
                  username: ${{ secrets.CPANEL_FTP_USERNAME }}
                  password: ${{ secrets.CPANEL_FTP_PASSWORD }}
                  protocol: ftps
                  port: 21
                  local-dir: ./.deploy/cpanel/
                  server-dir: ${{ secrets.CPANEL_FTP_SERVER_DIR }}
                  dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
                  state-name: .ftp-deploy-sync-state.json
                  exclude: |
                      **/.git*
                      **/.git*/**
                      node_modules/**
